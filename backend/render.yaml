services:
  - type: web
    name: slc-billing-api
    runtime: node
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: slc-billing-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://your-vercel-domain.vercel.app
      - key: JWT_SECRET
        sync: false
        value: ${JWT_SECRET}
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer

databases:
  - name: slc-billing-db
    databaseName: slc_billing_db
    plan: free
